<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Details | LuxAuto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a1a;
            --secondary: #0d0d0d;
            --accent: #c9a962;
            --accent-hover: #b8944f;
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-light: rgba(255, 255, 255, 0.95);
            --border: rgba(255, 255, 255, 0.1);
            --success: #22c55e;
            --danger: #ef4444;
            --info: #3b82f6;
            --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-accent: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--secondary);
            color: var(--text-light);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(13, 13, 13, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-light);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            border: 1px solid var(--border);
        }

        .back-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Main Content */
        .main-content {
            margin-top: 80px;
            padding: 2rem 5%;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Breadcrumb */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .breadcrumb a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .breadcrumb a:hover {
            color: var(--accent);
        }

        .breadcrumb i {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* Car Detail Container - Dark Theme */
        .detail-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Detail Grid */
        .detail-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 0;
        }

        /* Image Gallery */
        .gallery-section {
            position: relative;
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
            padding: 2rem;
        }

        .main-image-container {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .main-image {
            width: 100%;
            height: 450px;
            object-fit: cover;
            display: block;
        }

        .image-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .badge-new {
            background: var(--accent);
            color: var(--primary);
        }

        .badge-popular {
            background: var(--danger);
            color: white;
        }

        .badge-deal {
            background: var(--success);
            color: white;
        }

        .thumbnail-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }

        .thumbnail {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .thumbnail:hover, .thumbnail.active {
            opacity: 1;
            border-color: var(--accent);
        }

        /* Car Info Section */
        .info-section {
            padding: 2.5rem;
            color: var(--text-light);
            background: rgba(255, 255, 255, 0.02);
        }

        .car-header {
            margin-bottom: 1.5rem;
        }

        .car-brand {
            font-size: 0.9rem;
            color: var(--accent);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .car-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-light);
        }

        .car-subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .car-rating {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
        }

        .car-rating i {
            color: var(--accent);
        }

        /* Price Box */
        .price-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .price-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .price-label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .price-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        .price-original {
            text-decoration: line-through;
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        .savings-badge {
            background: var(--success);
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Quick Specs */
        .quick-specs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .spec-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .spec-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .spec-icon {
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .spec-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 0.2rem;
        }

        .spec-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* CTA Buttons */
        .cta-section {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn-primary {
            flex: 1;
            padding: 1rem 2rem;
            background: var(--accent);
            color: var(--primary);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(201, 169, 98, 0.3);
        }

        .btn-secondary {
            padding: 1rem 1.5rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-light);
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Description Section */
        .description-section {
            padding: 2.5rem;
            border-top: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title i {
            color: var(--accent);
        }

        .description-text {
            color: var(--text-muted);
            line-height: 1.8;
            font-size: 1rem;
        }

        /* Features Grid */
        .features-section {
            padding: 2.5rem;
            border-top: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border: 1px solid var(--border);
            color: var(--text-light);
            transition: all 0.2s ease;
        }

        .feature-item:hover {
            border-color: var(--accent);
            transform: translateX(5px);
        }

        .feature-item i {
            color: var(--accent);
        }

        /* Specs Table */
        .specs-section {
            padding: 2.5rem;
            border-top: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
        }

        .specs-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
        }

        .specs-table tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.03);
        }

        .specs-table td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .specs-table td:first-child {
            color: var(--text-muted);
            font-weight: 500;
            width: 40%;
        }

        .specs-table td:last-child {
            color: var(--text-light);
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .detail-grid {
                grid-template-columns: 1fr;
            }

            .main-image {
                height: 300px;
            }
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .car-title {
                font-size: 1.75rem;
            }

            .quick-specs {
                grid-template-columns: repeat(2, 1fr);
            }

            .cta-section {
                flex-direction: column;
            }

            .features-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Loading State */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 60vh;
            flex-direction: column;
            gap: 1rem;
            color: var(--text-light);
        }

        .loading i {
            font-size: 3rem;
            color: var(--accent);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error State */
        .error {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .error i {
            font-size: 4rem;
            color: var(--danger);
            margin-bottom: 1rem;
        }

        .error h2 {
            color: var(--text-light);
            margin-bottom: 1rem;
        }

        .error a {
            color: var(--accent);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <a href="index.html" class="logo">
            <i class="fas fa-car-side"></i>
            LuxAuto
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html" style="color: var(--accent);">Inventory</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i>
            Back to Listings
        </a>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Content will be loaded by JavaScript -->
    </main>

    <script>
        // Get car ID from URL
        function getCarIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return parseInt(params.get('id'));
        }

        // Generate car data that matches the listings page
        function generateCarData() {
            const carData = {
                brands: [
                    { name: 'Mercedes-Benz', models: ['S-Class', 'E-Class', 'C-Class', 'GLE', 'GLS', 'G-Wagon', 'AMG GT', 'SL', 'CLS', 'A-Class'] },
                    { name: 'BMW', models: ['M4', 'M3', 'X5', 'X7', '7 Series', '5 Series', 'iX', 'i4', 'M5', 'Z4'] },
                    { name: 'Audi', models: ['A8', 'A6', 'Q8', 'Q7', 'RS7', 'e-tron', 'R8', 'TT', 'Q5', 'A4'] },
                    { name: 'Porsche', models: ['911', 'Cayenne', 'Panamera', 'Taycan', 'Macan', '718 Cayman', 'Carrera', 'Turbo S'] },
                    { name: 'Lamborghini', models: ['Huracán', 'Urus', 'Aventador', 'Revuelto', 'Sterrato'] },
                    { name: 'Ferrari', models: ['Roma', 'SF90', '296 GTB', 'F8', 'Portofino', '812 Superfast'] },
                    { name: 'Bentley', models: ['Continental GT', 'Flying Spur', 'Bentayga', 'Mulliner'] },
                    { name: 'Rolls-Royce', models: ['Phantom', 'Ghost', 'Cullinan', 'Wraith', 'Spectre'] },
                    { name: 'McLaren', models: ['720S', 'Artura', 'GT', '765LT', 'P1'] },
                    { name: 'Aston Martin', models: ['DB11', 'Vantage', 'DBX', 'DBS', 'Valkyrie'] },
                    { name: 'Lexus', models: ['LS', 'LX', 'RX', 'LC', 'ES', 'GX'] },
                    { name: 'Cadillac', models: ['Escalade', 'CT5-V', 'Lyriq', 'XT6', 'Celestiq'] }
                ],
                fuelTypes: ['Gasoline', 'Hybrid', 'Electric', 'Diesel', 'Plug-in Hybrid'],
                transmissions: ['Automatic', 'Manual', 'Semi-Automatic', 'Dual-Clutch'],
                bodyTypes: ['Sedan', 'SUV', 'Coupe', 'Convertible', 'Supercar', 'Wagon', 'Hatchback']
            };

            const images = [
                'https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8?w=800',
                'https://images.unsplash.com/photo-1555215695-3004980ad54e?w=800',
                'https://upload.wikimedia.org/wikipedia/commons/5/50/Audi_Q8_IMG_3134.jpg',
                'https://images.unsplash.com/photo-1603584173870-7f23fdae1b7a?w=800',
                'https://images.unsplash.com/photo-1544636331-e26879cd4d9b?w=800',
                'https://images.unsplash.com/photo-1563720360172-67b8f3dce741?w=800',
                'https://images.unsplash.com/photo-1580273916550-e323be2ae537?q=80&w=464&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D',
                'https://images.unsplash.com/photo-1606664515524-ed2f786a0bd6?w=800',
                'https://images.unsplash.com/photo-1580274455191-1c62238fa333?w=800',
                'https://images.unsplash.com/photo-1617788138017-80ad40651399?w=800',
                'https://images.unsplash.com/photo-1606016159991-dfe4f2746ad5?w=800',
                'https://images.unsplash.com/photo-1552519507-da3b142c6e3d?w=800',
                'https://images.unsplash.com/photo-1494976388531-d1058494cdd8?w=800',
                'https://images.unsplash.com/photo-1583121274602-3e2820c69888?w=800',
                'https://images.unsplash.com/photo-1607853202273-797f1c22a38e?w=800',
                'https://images.unsplash.com/photo-1590362891991-f776e747a588?w=800'
            ];

            const cars = [];
            for (let i = 0; i < 48; i++) {
                const brand = carData.brands[Math.floor(Math.random() * carData.brands.length)];
                const model = brand.models[Math.floor(Math.random() * brand.models.length)];
                const year = 2020 + Math.floor(Math.random() * 5);
                const fuel = carData.fuelTypes[Math.floor(Math.random() * carData.fuelTypes.length)];
                const transmission = carData.transmissions[Math.floor(Math.random() * carData.transmissions.length)];
                const body = carData.bodyTypes[Math.floor(Math.random() * carData.bodyTypes.length)];
                
                let basePrice = 40000;
                if (['Lamborghini', 'Ferrari', 'McLaren', 'Rolls-Royce', 'Bentley'].includes(brand.name)) {
                    basePrice = 200000 + Math.random() * 300000;
                } else if (['Porsche', 'Mercedes-Benz', 'BMW', 'Audi'].includes(brand.name)) {
                    basePrice = 60000 + Math.random() * 140000;
                } else {
                    basePrice = 40000 + Math.random() * 80000;
                }
                
                const price = Math.round(basePrice + (year - 2020) * 5000);
                const hasDiscount = Math.random() > 0.7;
                const originalPrice = hasDiscount ? Math.round(price * 1.15) : null;
                
                const horsepower = 300 + Math.floor(Math.random() * 700);
                const zeroToSixty = (2.5 + Math.random() * 4).toFixed(1);
                const mileage = Math.floor(Math.random() * 50000);
                
                const badges = [];
                if (Math.random() > 0.7) badges.push('New Arrival');
                if (Math.random() > 0.8) badges.push('Popular');
                if (Math.random() > 0.85) badges.push('Featured');
                if (hasDiscount) badges.push('Great Deal');

                const baseImage = images[i % images.length];
                
                cars.push({
                    id: i + 1,
                    brand: brand.name,
                    model: model,
                    year: year,
                    price: price,
                    originalPrice: originalPrice,
                    fuel: fuel,
                    transmission: transmission,
                    body: body,
                    horsepower: horsepower,
                    zeroToSixty: zeroToSixty,
                    mileage: mileage,
                    badges: badges,
                    image: baseImage + '&auto=format&fit=crop',
                    gallery: [
                        baseImage + '&auto=format&fit=crop',
                        images[(i + 1) % images.length] + '&auto=format&fit=crop',
                        images[(i + 2) % images.length] + '&auto=format&fit=crop',
                        images[(i + 3) % images.length] + '&auto=format&fit=crop'
                    ],
                    description: `Experience the ultimate in luxury and performance with this exceptional ${brand.name} ${model}. This ${year} model combines stunning design with cutting-edge technology, delivering an unforgettable driving experience. With its ${fuel} powertrain and ${transmission} transmission, it offers both efficiency and exhilaration. The ${body} body style provides the perfect balance of practicality and style, while the meticulously crafted interior ensures every journey is traveled in supreme comfort.`,
                    features: [
                        "Premium Leather Interior",
                        "Advanced Navigation System",
                        "Climate Control",
                        "Premium Audio System",
                        "Parking Sensors",
                        "Cruise Control",
                        "Keyless Entry",
                        "Heated Seats",
                        "Sunroof",
                        "Bluetooth Connectivity"
                    ],
                    specs: {
                        engine: fuel === 'Electric' ? 'Dual Electric Motors' : `${(2.0 + Math.random() * 4.0).toFixed(1)}L V${Math.floor(Math.random() * 2) * 2 + 6}`,
                        power: `${horsepower} HP`,
                        torque: `${Math.floor(horsepower * 0.8)} lb-ft`,
                        acceleration: `${zeroToSixty}s`,
                        topSpeed: `${Math.floor(200 + Math.random() * 100)} mph`,
                        fuelEconomy: fuel === 'Electric' ? '3.5 mi/kWh' : `${Math.floor(15 + Math.random() * 20)} MPG`,
                        drivetrain: Math.random() > 0.5 ? 'AWD' : 'RWD',
                        weight: `${Math.floor(3500 + Math.random() * 2000)} lbs`
                    }
                });
            }
            
            return cars;
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            const carId = getCarIdFromUrl();
            const mainContent = document.getElementById('mainContent');
            
            if (!carId) {
                mainContent.innerHTML = `
                    <div class="error">
                        <i class="fas fa-exclamation-circle"></i>
                        <h2>No Car Selected</h2>
                        <p>Please return to the <a href="index.html">inventory page</a> and select a vehicle.</p>
                    </div>
                `;
                return;
            }

            // Try to get car from localStorage first
            let car = null;
            const storedCar = localStorage.getItem('selectedCar');
            
            if (storedCar) {
                try {
                    const parsed = JSON.parse(storedCar);
                    if (parsed.id === carId) {
                        car = parsed;
                        car.gallery = car.gallery || [car.image, car.image, car.image, car.image];
                        car.description = car.description || `Experience luxury with this ${car.brand} ${car.model}.`;
                        car.features = car.features || ["Premium Features", "Luxury Interior", "Advanced Technology"];
                        car.specs = car.specs || {
                            engine: "V6 Engine",
                            power: "350 HP",
                            torque: "350 lb-ft",
                            acceleration: car.zeroToSixty + "s",
                            topSpeed: "155 mph",
                            fuelEconomy: "25 MPG",
                            drivetrain: "AWD",
                            weight: "4,000 lbs"
                        };
                    }
                } catch (e) {
                    console.error('Error parsing stored car:', e);
                }
            }

            // If no stored car or ID mismatch, generate from database
            if (!car) {
                const allCars = generateCarData();
                car = allCars.find(c => c.id === carId);
            }

            if (!car) {
                mainContent.innerHTML = `
                    <div class="error">
                        <i class="fas fa-car-crash"></i>
                        <h2>Car Not Found</h2>
                        <p>The vehicle you're looking for doesn't exist. <a href="index.html">Return to inventory</a></p>
                    </div>
                `;
                return;
            }

            renderCarDetails(car);
        });

        // Render car details
        function renderCarDetails(car) {
            const mainBadge = car.badges.find(b => ['New Arrival', 'Popular', 'Great Deal'].includes(b)) || car.badges[0];
            const badgeClass = mainBadge === 'New Arrival' ? 'badge-new' : 
                              mainBadge === 'Popular' ? 'badge-popular' : 
                              mainBadge === 'Great Deal' ? 'badge-deal' : 'badge-new';

            const savings = car.originalPrice ? car.originalPrice - car.price : 0;

            document.getElementById('mainContent').innerHTML = `
                <!-- Breadcrumb -->
                <nav class="breadcrumb">
                    <a href="index.html">Home</a>
                    <i class="fas fa-chevron-right"></i>
                    <a href="index.html">Inventory</a>
                    <i class="fas fa-chevron-right"></i>
                    <span>${car.brand} ${car.model}</span>
                </nav>

                <!-- Detail Container -->
                <div class="detail-container">
                    <div class="detail-grid">
                        <!-- Image Gallery -->
                        <div class="gallery-section">
                            <div class="main-image-container">
                                <img src="${car.image}" alt="${car.brand} ${car.model}" class="main-image" id="mainImage">
                                ${mainBadge ? `<span class="image-badge ${badgeClass}">${mainBadge}</span>` : ''}
                            </div>
                            <div class="thumbnail-grid">
                                ${car.gallery.map((img, index) => `
                                    <img src="${img}" 
                                         class="thumbnail ${index === 0 ? 'active' : ''}" 
                                         onclick="changeMainImage('${img}', this)"
                                         alt="View ${index + 1}">
                                `).join('')}
                            </div>
                        </div>

                        <!-- Car Info -->
                        <div class="info-section">
                            <div class="car-header">
                                <div class="car-brand">${car.brand}</div>
                                <h1 class="car-title">${car.model}</h1>
                                <p class="car-subtitle">${car.year} • ${car.body} • ${car.transmission}</p>
                                <div class="car-rating">
                                    <i class="fas fa-star"></i>
                                    <i class="fas fa-star"></i>
                                    <i class="fas fa-star"></i>
                                    <i class="fas fa-star"></i>
                                    <i class="fas fa-star-half-alt"></i>
                                    <span style="margin-left: 0.5rem;">4.8 (124 reviews)</span>
                                </div>
                            </div>

                            <div class="price-box">
                                <div class="price-header">
                                    <div>
                                        <div class="price-label">Price</div>
                                        <div class="price-value">$${car.price.toLocaleString()}</div>
                                        ${car.originalPrice ? `<div class="price-original">$${car.originalPrice.toLocaleString()}</div>` : ''}
                                    </div>
                                    ${savings > 0 ? `<span class="savings-badge">Save $${savings.toLocaleString()}</span>` : ''}
                                </div>
                            </div>

                            <div class="quick-specs">
                                <div class="spec-card">
                                    <div class="spec-icon"><i class="fas fa-tachometer-alt"></i></div>
                                    <div class="spec-value">${car.zeroToSixty}s</div>
                                    <div class="spec-label">0-60 mph</div>
                                </div>
                                <div class="spec-card">
                                    <div class="spec-icon"><i class="fas fa-gas-pump"></i></div>
                                    <div class="spec-value">${car.fuel}</div>
                                    <div class="spec-label">Fuel Type</div>
                                </div>
                                <div class="spec-card">
                                    <div class="spec-icon"><i class="fas fa-road"></i></div>
                                    <div class="spec-value">${car.mileage.toLocaleString()}</div>
                                    <div class="spec-label">Mileage</div>
                                </div>
                            </div>

                            <div class="cta-section">
                                <button class="btn-primary" onclick="contactSeller(${car.id})">
                                    <i class="fas fa-phone"></i>
                                    Contact Seller
                                </button>
                                <button class="btn-secondary" onclick="scheduleTestDrive(${car.id})">
                                    <i class="fas fa-calendar"></i>
                                    Test Drive
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Description -->
                    <div class="description-section">
                        <h2 class="section-title">
                            <i class="fas fa-info-circle"></i>
                            Description
                        </h2>
                        <p class="description-text">${car.description}</p>
                    </div>

                    <!-- Features -->
                    <div class="features-section">
                        <h2 class="section-title">
                            <i class="fas fa-list-check"></i>
                            Features & Equipment
                        </h2>
                        <div class="features-grid">
                            ${car.features.map(feature => `
                                <div class="feature-item">
                                    <i class="fas fa-check-circle"></i>
                                    <span>${feature}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- Specifications -->
                    <div class="specs-section">
                        <h2 class="section-title">
                            <i class="fas fa-clipboard-list"></i>
                            Technical Specifications
                        </h2>
                        <table class="specs-table">
                            <tr>
                                <td>Engine</td>
                                <td>${car.specs.engine}</td>
                            </tr>
                            <tr>
                                <td>Power Output</td>
                                <td>${car.specs.power}</td>
                            </tr>
                            <tr>
                                <td>Torque</td>
                                <td>${car.specs.torque}</td>
                            </tr>
                            <tr>
                                <td>Acceleration (0-60)</td>
                                <td>${car.specs.acceleration}</td>
                            </tr>
                            <tr>
                                <td>Top Speed</td>
                                <td>${car.specs.topSpeed}</td>
                            </tr>
                            <tr>
                                <td>Fuel Economy</td>
                                <td>${car.specs.fuelEconomy}</td>
                            </tr>
                            <tr>
                                <td>Drivetrain</td>
                                <td>${car.specs.drivetrain}</td>
                            </tr>
                            <tr>
                                <td>Curb Weight</td>
                                <td>${car.specs.weight}</td>
                            </tr>
                        </table>
                    </div>
                </div>
            `;
        }

        // Change main image
        function changeMainImage(src, thumbnail) {
            document.getElementById('mainImage').src = src;
            document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
            thumbnail.classList.add('active');
        }

        // Contact seller
        function contactSeller(id) {
            alert(`Contacting seller for vehicle #${id}...\n\nThis would open a contact form or initiate a call.`);
        }

        // Schedule test drive
        function scheduleTestDrive(id) {
            alert(`Scheduling test drive for vehicle #${id}...\n\nThis would open a calendar booking system.`);
        }
    </script>
</body>
</html>
