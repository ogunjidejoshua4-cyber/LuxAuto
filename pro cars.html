<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Car Listings | Joshgiver Rentals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        primary: '#667eea',
                        secondary: '#764ba2',
                        accent: '#f093fb',
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'slide-up': 'slideUp 0.5s ease-out',
                        'fade-in': 'fadeIn 0.3s ease-out',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            background: rgba(255, 255, 255, 1);
        }
        
        .car-image-container {
            overflow: hidden;
            position: relative;
        }
        
        .car-image-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .glass-card:hover .car-image-container::after {
            opacity: 1;
        }
        
        .car-image {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-card:hover .car-image {
            transform: scale(1.1);
        }
        
        .quick-actions {
            transform: translateY(100%);
            opacity: 0;
            transition: all 0.3s ease;
        }
        
        .glass-card:hover .quick-actions {
            transform: translateY(0);
            opacity: 1;
        }
        
        .filter-chip {
            transition: all 0.2s ease;
        }
        
        .filter-chip.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        
        .price-slider {
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            background: #e5e7eb;
            border-radius: 5px;
            outline: none;
        }
        
        .price-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(102, 126, 234, 0.4);
        }
        
        .favorite-btn {
            transition: all 0.3s ease;
        }
        
        .favorite-btn.active {
            color: #ef4444;
            transform: scale(1.1);
        }
        
        .spec-badge {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            transition: all 0.2s ease;
        }
        
        .glass-card:hover .spec-badge {
            background: rgba(102, 126, 234, 0.2);
        }
        
        .view-details-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        
        .view-details-btn:hover {
            transform: translateX(5px);
            box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.4);
        }
        
        .sort-dropdown {
            transform-origin: top right;
            transition: all 0.2s ease;
        }
        
        .sort-dropdown.hidden {
            transform: scale(0.95);
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .badge-popular {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .badge-new {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        .badge-deal {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }
    </style>
</head>
<body class="antialiased">

    </nav>

    <!-- Hero Section -->

            <div class="absolute bottom-10 right-10 w-96 h-96 bg-accent rounded-full mix-blend-overlay filter blur-3xl animate-float" style="animation-delay: 2s;"></div>
        </div>

            <p class="text-xl text-white/90 max-w-2xl mx-auto drop-shadow-md">Browse our premium collection of vehicles with unbeatable prices and exceptional service</p>

    </div>

    <!-- Main Content -->

        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- Filters Sidebar -->
            <aside class="lg:w-80 flex-shrink-0">

                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                            <i class="fas fa-filter text-primary"></i>
                            Filters
                        </h3>
                        <button onclick="resetFilters()" class="text-sm text-primary hover:text-secondary font-medium transition-colors">
                            Reset All
                        </button>
                    </div>

                    <!-- Price Range -->
                    <div class="mb-8">
                        <label class="block text-sm font-semibold text-gray-700 mb-3">Price Range</label>
                        <div class="px-2">
                            <input type="range" min="0" max="1000" value="500" class="price-slider w-full mb-3" id="priceRange">
                            <div class="flex justify-between text-sm text-gray-600 font-medium">
                                <span>$0</span>
                                <span id="priceValue" class="text-primary font-bold">$500/day</span>
                                <span>$1000+</span>
                            </div>
                        </div>
                    </div>

                    <!-- Brand Filter -->
                    <div class="mb-6">
                        <label class="block text-sm font-semibold text-gray-700 mb-3">Brand</label>
                        <div class="space-y-2" id="brandFilters">
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="checkbox" value="bmw" class="w-5 h-5 rounded border-gray-300 text-primary focus:ring-primary transition-all filter-checkbox">
                                <span class="text-gray-700 group-hover:text-primary transition-colors">BMW</span>
                                <span class="ml-auto text-xs text-gray-400">(12)</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="checkbox" value="mercedes" class="w-5 h-5 rounded border-gray-300 text-primary focus:ring-primary transition-all filter-checkbox">
                                <span class="text-gray-700 group-hover:text-primary transition-colors">Mercedes-Benz</span>
                                <span class="ml-auto text-xs text-gray-400">(8)</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="checkbox" value="audi" class="w-5 h-5 rounded border-gray-300 text-primary focus:ring-primary transition-all filter-checkbox">
                                <span class="text-gray-700 group-hover:text-primary transition-colors">Audi</span>
                                <span class="ml-auto text-xs text-gray-400">(6)</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="checkbox" value="tesla" class="w-5 h-5 rounded border-gray-300 text-primary focus:ring-primary transition-all filter-checkbox">
                                <span class="text-gray-700 group-hover:text-primary transition-colors">Tesla</span>
                                <span class="ml-auto text-xs text-gray-400">(4)</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="checkbox" value="porsche" class="w-5 h-5 rounded border-gray-300 text-primary focus:ring-primary transition-all filter-checkbox">
                                <span class="text-gray-700 group-hover:text-primary transition-colors">Porsche</span>
                                <span class="ml-auto text-xs text-gray-400">(3)</span>
                            </label>
                        </div>
                    </div>

                    <!-- Fuel Type -->
                    <div class="mb-6">
                        <label class="block text-sm font-semibold text-gray-700 mb-3">Fuel Type</label>
                        <div class="flex flex-wrap gap-2" id="fuelFilters">
                            <button class="filter-chip px-4 py-2 rounded-full border border-gray-200 text-sm font-medium text-gray-600 hover:border-primary hover:text-primary" data-value="gasoline">
                                <i class="fas fa-gas-pump mr-1"></i>Gasoline
                            </button>
                            <button class="filter-chip px-4 py-2 rounded-full border border-gray-200 text-sm font-medium text-gray-600 hover:border-primary hover:text-primary" data-value="diesel">
                                <i class="fas fa-oil-can mr-1"></i>Diesel
                            </button>
                            <button class="filter-chip px-4 py-2 rounded-full border border-gray-200 text-sm font-medium text-gray-600 hover:border-primary hover:text-primary" data-value="electric">
                                <i class="fas fa-bolt mr-1"></i>Electric
                            </button>
                            <button class="filter-chip px-4 py-2 rounded-full border border-gray-200 text-sm font-medium text-gray-600 hover:border-primary hover:text-primary" data-value="hybrid">
                                <i class="fas fa-leaf mr-1"></i>Hybrid
                            </button>
                        </div>
                    </div>

                    <!-- Transmission -->
                    <div class="mb-6">
                        <label class="block text-sm font-semibold text-gray-700 mb-3">Transmission</label>
                        <div class="flex gap-3" id="transmissionFilters">
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="transmission" value="automatic" class="hidden peer">
                                <div class="text-center py-3 rounded-xl border-2 border-gray-200 peer-checked:border-primary peer-checked:bg-primary/5 transition-all hover:border-gray-300">
                                    <i class="fas fa-cog text-xl mb-1 text-gray-400 peer-checked:text-primary"></i>
                                    <div class="text-sm font-medium text-gray-700">Auto</div>
                                </div>
                            </label>
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="transmission" value="manual" class="hidden peer">
                                <div class="text-center py-3 rounded-xl border-2 border-gray-200 peer-checked:border-primary peer-checked:bg-primary/5 transition-all hover:border-gray-300">
                                    <i class="fas fa-hand-paper text-xl mb-1 text-gray-400 peer-checked:text-primary"></i>
                                    <div class="text-sm font-medium text-gray-700">Manual</div>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- Additional Filters -->
                    <div class="pt-4 border-t border-gray-200">
                        <label class="flex items-center gap-3 cursor-pointer mb-3">
                            <input type="checkbox" id="instantBook" class="w-5 h-5 rounded border-gray-300 text-primary focus:ring-primary">
                            <span class="text-gray-700 text-sm">Instant Booking</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="freeCancellation" class="w-5 h-5 rounded border-gray-300 text-primary focus:ring-primary">
                            <span class="text-gray-700 text-sm">Free Cancellation</span>
                        </label>
                    </div>
                </div>
            </aside>

            <!-- Car Grid -->
            <main class="flex-1">
                <!-- Sort & Results Header -->
                <div class="glass-panel rounded-2xl p-4 mb-6 flex flex-col sm:flex-row items-center justify-between gap-4 shadow-lg">
                    <div class="text-gray-700 font-medium">
                        Showing <span class="text-primary font-bold" id="resultCount">12</span> vehicles
                    </div>
                    
                    <div class="flex items-center gap-4">
                        <div class="relative">
                            <button onclick="toggleSort()" class="flex items-center gap-2 px-4 py-2 bg-white rounded-xl border border-gray-200 hover:border-primary transition-colors text-gray-700 font-medium">
                                <i class="fas fa-sort text-primary"></i>
                                <span id="currentSort">Latest Added</span>
                                <i class="fas fa-chevron-down text-xs ml-1"></i>
                            </button>
                            
                            <div id="sortDropdown" class="sort-dropdown hidden absolute right-0 top-full mt-2 w-48 bg-white rounded-xl shadow-xl border border-gray-100 overflow-hidden z-20">
                                <button onclick="sortCars('latest')" class="w-full text-left px-4 py-3 hover:bg-gray-50 text-gray-700 font-medium transition-colors flex items-center gap-2">
                                    <i class="fas fa-clock text-primary"></i> Latest Added
                                </button>
                                <button onclick="sortCars('cheapest')" class="w-full text-left px-4 py-3 hover:bg-gray-50 text-gray-700 font-medium transition-colors flex items-center gap-2">
                                    <i class="fas fa-arrow-down text-green-500"></i> Price: Low to High
                                </button>
                                <button onclick="sortCars('expensive')" class="w-full text-left px-4 py-3 hover:bg-gray-50 text-gray-700 font-medium transition-colors flex items-center gap-2">
                                    <i class="fas fa-arrow-up text-red-500"></i> Price: High to Low
                                </button>
                                <button onclick="sortCars('popular')" class="w-full text-left px-4 py-3 hover:bg-gray-50 text-gray-700 font-medium transition-colors flex items-center gap-2">
                                    <i class="fas fa-fire text-orange-500"></i> Most Popular
                                </button>
                            </div>
                        </div>
                        
                        <div class="flex bg-white rounded-xl border border-gray-200 p-1">
                            <button class="p-2 rounded-lg bg-primary text-white shadow-md transition-all">
                                <i class="fas fa-th-large"></i>
                            </button>
                            <button class="p-2 rounded-lg text-gray-400 hover:text-gray-600 transition-all">
                                <i class="fas fa-list"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Grid -->
                <div id="carGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                    <!-- Cars will be injected here via JavaScript -->
                </div>

                <!-- Load More -->
                <div class="mt-12 text-center">
                    <button onclick="loadMore()" class="px-8 py-4 bg-white/90 backdrop-blur rounded-full text-primary font-bold shadow-lg hover:shadow-xl hover:scale-105 transition-all flex items-center gap-2 mx-auto">
                        <span>Load More Vehicles</span>
                        <i class="fas fa-chevron-down animate-bounce"></i>
                    </button>
                </div>
            </main>
        </div>
    </div>

    <script>
        // Car Data
        const cars = [
            {
                id: 1,
                name: "BMW M4 Competition",
                brand: "bmw",
                price: 285,
                originalPrice: 320,
                image: "https://images.unsplash.com/photo-1617531653520-4893f7bbf978?w=800&q=80",

            },
            {

                fuel: "electric",
                transmission: "automatic",
                seats: 5,
                rating: 4.9,
                reviews: 215,

                specs: { range: "637km", accel: "2.1s" }
            },
            {
                id: 4,
                name: "Audi RS e-tron GT",
                brand: "audi",
                price: 320,
                originalPrice: 380,
                image: "https://images.unsplash.com/photo-1603584173870-7f23fdae1b7a?w=800&q=80",
                fuel: "electric",
                transmission: "automatic",
                seats: 4,
                rating: 4.7,
                reviews: 78,
                badge: "new",
                specs: { range: "472km", accel: "3.3s" }
            },
            {
                id: 5,
                name: "Porsche 911 Carrera",
                brand: "porsche",
                price: 395,
                originalPrice: 450,
                image: "https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=800&q=80",
                fuel: "gasoline",
                transmission: "automatic",
                seats: 4,
                rating: 5.0,
                reviews: 156,
                badge: "popular",
                specs: { speed: "293km/h", accel: "4.0s" }
            },
            {
                id: 6,
                name: "BMW X7 M60i",
                brand: "bmw",
                price: 340,
                originalPrice: 400,
                image: "https://images.unsplash.com/photo-1555215695-3004980ad54e?w=800&q=80",
                fuel: "gasoline",
                transmission: "automatic",
                seats: 7,
                rating: 4.6,
                reviews: 64,
                badge: null,
                specs: { speed: "250km/h", accel: "4.7s" }
            },
            {
                id: 7,
                name: "Mercedes-AMG GT",
                brand: "mercedes",
                price: 420,
                originalPrice: 480,
                image: "https://images.unsplash.com/photo-1618843479248-a4f4958f6d0e?w=800&q=80",
                fuel: "gasoline",
                transmission: "automatic",
                seats: 2,
                rating: 4.8,
                reviews: 89,
                badge: "deal",
                specs: { speed: "318km/h", accel: "3.8s" }
            },
            {
                id: 8,
                name: "Audi Q8 e-tron",
                brand: "audi",
                price: 275,
                originalPrice: 310,
                image: "https://images.unsplash.com/photo-1606664515524-ed2f786a0bd6?w=800&q=80",
                fuel: "electric",
                transmission: "automatic",
                seats: 5,
                rating: 4.5,
                reviews: 52,
                badge: null,
                specs: { range: "411km", accel: "5.7s" }
            },
            {
                id: 9,
                name: "Tesla Model X",
                brand: "tesla",
                price: 295,
                originalPrice: 350,
                image: "https://images.unsplash.com/photo-1560958089-b8a1929cea89?w=800&q=80",
                fuel: "electric",
                transmission: "automatic",
                seats: 7,
                rating: 4.7,
                reviews: 143,
                badge: "popular",
                specs: { range: "560km", accel: "3.9s" }
            }
        ];

        let currentCars = [...cars];
        let favorites = new Set();

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderCars(currentCars);
            setupFilters();
            setupPriceSlider();
        });

        function renderCars(carsToRender) {
            const grid = document.getElementById('carGrid');
            grid.innerHTML = '';
            
            carsToRender.forEach((car, index) => {
                const card = createCarCard(car, index);
                grid.appendChild(card);
            });
            
            document.getElementById('resultCount').textContent = carsToRender.length;
        }

        function createCarCard(car, index) {
            const div = document.createElement('div');
            div.className = 'glass-card rounded-2xl overflow-hidden shadow-lg animate-slide-up';
            div.style.animationDelay = `${index * 0.1}s`;
            
            const badgeHTML = car.badge ? `
                <div class="absolute top-4 left-4 z-10">
                    <span class="badge-${car.badge} text-white text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider shadow-lg">
                        ${car.badge === 'popular' ? 'Hot' : car.badge === 'new' ? 'New' : 'Deal'}
                    </span>
                </div>
            ` : '';
            
            const isFavorite = favorites.has(car.id);
            
            div.innerHTML = `
                <div class="car-image-container h-56 relative">
                    ${badgeHTML}
                    <button onclick="toggleFavorite(${car.id})" class="favorite-btn absolute top-4 right-4 z-10 w-10 h-10 rounded-full bg-white/90 backdrop-blur flex items-center justify-center shadow-lg ${isFavorite ? 'active' : 'text-gray-400 hover:text-red-500'}">
                        <i class="fas fa-heart"></i>
                    </button>
                    <img src="${car.image}" alt="${car.name}" class="car-image w-full h-full object-cover">
                    
                    <!-- Quick Actions Overlay -->
                    <div class="quick-actions absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black/80 to-transparent flex gap-2">
                        <button class="flex-1 bg-white/20 backdrop-blur text-white py-2 rounded-lg text-sm font-medium hover:bg-white/30 transition-colors">
                            <i class="fas fa-calendar-alt mr-1"></i> Book Now
                        </button>
                        <button class="w-10 bg-white/20 backdrop-blur text-white rounded-lg hover:bg-white/30 transition-colors flex items-center justify-center">
                            <i class="fas fa-share-alt"></i>
                        </button>
                    </div>
                </div>
                
                <div class="p-5">
                    <div class="flex items-start justify-between mb-2">
                        <div>
                            <h3 class="text-lg font-bold text-gray-800 leading-tight mb-1">${car.name}</h3>
                            <div class="flex items-center gap-1 text-sm text-gray-500">
                                <i class="fas fa-star text-yellow-400"></i>
                                <span class="font-semibold text-gray-700">${car.rating}</span>
                                <span>(${car.reviews} reviews)</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex gap-2 mb-4">
                        <span class="spec-badge px-2 py-1 rounded-lg text-xs font-semibold flex items-center gap-1">
                            <i class="fas fa-user"></i> ${car.seats} seats
                        </span>
                        <span class="spec-badge px-2 py-1 rounded-lg text-xs font-semibold flex items-center gap-1">
                            <i class="fas fa-${car.fuel === 'electric' ? 'bolt' : 'gas-pump'}"></i> ${car.fuel}
                        </span>
                        <span class="spec-badge px-2 py-1 rounded-lg text-xs font-semibold flex items-center gap-1">
                            <i class="fas fa-cog"></i> ${car.transmission}
                        </span>
                    </div>
                    
                    <div class="flex items-end justify-between pt-4 border-t border-gray-100">
                        <div>
                            <div class="text-2xl font-bold text-primary">$${car.price}<span class="text-sm text-gray-500 font-normal">/day</span></div>
                            ${car.originalPrice ? `<div class="text-sm text-gray-400 line-through">$${car.originalPrice}</div>` : ''}
                        </div>
                        <button onclick="viewDetails(${car.id})" class="view-details-btn px-5 py-2.5 rounded-xl text-white font-semibold text-sm flex items-center gap-2 group">
                            View Details
                            <i class="fas fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
                        </button>
                    </div>
                </div>
            `;
            
            return div;
        }

        function setupFilters() {
            // Brand checkboxes
            document.querySelectorAll('#brandFilters input').forEach(checkbox => {
                checkbox.addEventListener('change', applyFilters);
            });
            
            // Fuel type chips
            document.querySelectorAll('#fuelFilters .filter-chip').forEach(chip => {
                chip.addEventListener('click', function() {
                    this.classList.toggle('active');
                    applyFilters();
                });
            });
            
            // Transmission
            document.querySelectorAll('input[name="transmission"]').forEach(radio => {
                radio.addEventListener('change', applyFilters);
            });
            
            // Checkboxes
            document.getElementById('instantBook').addEventListener('change', applyFilters);
            document.getElementById('freeCancellation').addEventListener('change', applyFilters);
        }

        function setupPriceSlider() {
            const slider = document.getElementById('priceRange');
            const valueDisplay = document.getElementById('priceValue');
            
            slider.addEventListener('input', function() {
                valueDisplay.textContent = `$${this.value}/day`;
                applyFilters();
            });
        }

        function applyFilters() {
            const maxPrice = parseInt(document.getElementById('priceRange').value);
            
            // Get selected brands
            const selectedBrands = Array.from(document.querySelectorAll('#brandFilters input:checked')).map(cb => cb.value);
            
            // Get selected fuel types
            const selectedFuels = Array.from(document.querySelectorAll('#fuelFilters .filter-chip.active')).map(btn => btn.dataset.value);
            
            // Get selected transmission
            const selectedTransmission = document.querySelector('input[name="transmission"]:checked')?.value;
            
            let filtered = cars.filter(car => {
                if (car.price > maxPrice) return false;
                if (selectedBrands.length > 0 && !selectedBrands.includes(car.brand)) return false;
                if (selectedFuels.length > 0 && !selectedFuels.includes(car.fuel)) return false;
                if (selectedTransmission && car.transmission !== selectedTransmission) return false;
                return true;
            });
            
            currentCars = filtered;
            renderCars(currentCars);
        }

        function resetFilters() {
            document.getElementById('priceRange').value = 1000;
            document.getElementById('priceValue').textContent = '$1000/day';
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.querySelectorAll('input[type="radio"]').forEach(radio => radio.checked = false);
            document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
            currentCars = [...cars];
            renderCars(currentCars);
        }

        function toggleSort() {
            const dropdown = document.getElementById('sortDropdown');
            dropdown.classList.toggle('hidden');
        }

        function sortCars(type) {
            let sorted = [...currentCars];
            
            switch(type) {
                case 'latest':
                    sorted.sort((a, b) => b.id - a.id);
                    document.getElementById('currentSort').textContent = 'Latest Added';
                    break;
                case 'cheapest':
                    sorted.sort((a, b) => a.price - b.price);
                    document.getElementById('currentSort').textContent = 'Price: Low to High';
                    break;
                case 'expensive':
                    sorted.sort((a, b) => b.price - a.price);
                    document.getElementById('currentSort').textContent = 'Price: High to Low';
                    break;
                case 'popular':
                    sorted.sort((a, b) => b.reviews - a.reviews);
                    document.getElementById('currentSort').textContent = 'Most Popular';
                    break;
            }
            
            currentCars = sorted;
            renderCars(currentCars);
            toggleSort();
        }

        function toggleFavorite(id) {
            if (favorites.has(id)) {
                favorites.delete(id);
            } else {
                favorites.add(id);
            }
            renderCars(currentCars);
        }

        function viewDetails(id) {
            const car = cars.find(c => c.id === id);
            alert(`Viewing details for ${car.name}\n\nThis would open a detailed modal or navigate to a details page with full specifications, availability calendar, and booking form.`);
        }

        function loadMore() {
            // Simulate loading more cars
            const btn = event.target.closest('button');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
            
            setTimeout(() => {
                // Duplicate existing cars with slight modifications to simulate more data
                const newCars = cars.slice(0, 3).map(car => ({
                    ...car,
                    id: car.id + 100,
                    price: car.price - 20
                }));
                
                cars.push(...newCars);
                currentCars = [...cars];
                applyFilters();
                
                btn.innerHTML = '<span>Load More Vehicles</span><i class="fas fa-chevron-down animate-bounce"></i>';
            }, 1000);
        }

        // Close sort dropdown when clicking outside
        document.addEventListener('click', function(e) {
            const sortContainer = document.querySelector('.relative');
            const dropdown = document.getElementById('sortDropdown');
            
            if (!sortContainer.contains(e.target) && !dropdown.classList.contains('hidden')) {
                dropdown.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
